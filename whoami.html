<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
<title>מי אני? — יום הולדת 60 לחניתה</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Rubik:wght@600;800;900&family=Heebo:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#111827;--panel:#202b3d;--ink:#fff;--muted:#a9b5c5;--gold:#ffd166;--pink:#ef5da8;--purple:#9b5de5;--green:#42d392;--red:#ff6174}
*{box-sizing:border-box}html,body{margin:0;min-height:100%;overflow:hidden}body{font-family:"Heebo",sans-serif;color:var(--ink);background:radial-gradient(circle at 15% 10%,rgba(239,93,168,.23),transparent 28%),radial-gradient(circle at 88% 82%,rgba(155,93,229,.25),transparent 30%),var(--bg)}
body::before{content:"";position:fixed;inset:0;pointer-events:none;opacity:.18;background-image:radial-gradient(circle,var(--gold) 2px,transparent 2px),radial-gradient(circle,var(--pink) 2px,transparent 2px);background-size:63px 63px,91px 91px;background-position:0 0,25px 38px}
button,input{font:inherit}.screen{position:relative;z-index:2;min-height:100dvh;padding:max(18px,env(safe-area-inset-top)) 18px max(18px,env(safe-area-inset-bottom));display:none;flex-direction:column;align-items:center;justify-content:center;text-align:center}.screen.show{display:flex}
.badge{display:grid;place-items:center;width:78px;height:78px;border-radius:50%;font:900 35px "Rubik";color:#2b1e05;background:radial-gradient(circle at 35% 25%,#fff5bb,var(--gold) 55%,#c98717);border:3px solid #fff0a5;box-shadow:0 0 0 7px rgba(255,209,102,.12),0 12px 35px #0007;rotate:-6deg}
h1,h2{font-family:"Rubik";margin:16px 0 6px}h1{font-size:clamp(35px,10vw,64px)}h2{font-size:clamp(28px,8vw,46px)}p{color:var(--muted);font-size:18px;line-height:1.55;max-width:560px;margin:6px auto 20px}.primary,.secondary{border:0;border-radius:15px;padding:14px 24px;font-weight:800;font-size:19px;cursor:pointer}.primary{background:linear-gradient(135deg,var(--gold),#ffb72e);color:#2b1e05;box-shadow:0 8px 25px rgba(255,183,46,.25)}.secondary{background:var(--panel);color:#fff;border:1px solid #ffffff18}.actions{display:flex;gap:10px;flex-wrap:wrap;justify-content:center}
.lock{width:min(430px,100%);padding:28px;background:#1d2939dd;border:1px solid #ffffff17;border-radius:24px}.lock input{width:100%;padding:13px;margin:12px 0;border-radius:12px;border:1px solid #ffffff24;background:#111827;color:white;text-align:center;font-size:18px}.error{color:#ff9dac;min-height:24px}
.instructions{display:grid;grid-template-columns:1fr 1fr;gap:12px;width:min(540px,100%);margin:8px 0 24px}.instruction{padding:16px 10px;border-radius:18px;background:#ffffff0a;border:1px solid #ffffff12}.instruction strong{display:block;font-size:20px}.phone{font-size:43px;display:block;margin-bottom:5px}.yes{color:#7ff2b8}.skip{color:#ff9aa8}
#game{justify-content:space-between}.game-head{width:100%;display:flex;align-items:center;justify-content:space-between;max-width:720px}.timer{font:900 44px "Rubik";color:var(--gold)}.score{font:800 22px "Rubik"}.word-card{position:relative;width:min(680px,94vw);min-height:43vh;display:grid;place-items:center;padding:28px;border-radius:34px;background:linear-gradient(145deg,#fff,#e7eaf0);color:#182130;box-shadow:0 22px 70px #0007,inset 0 0 0 4px #ffffff;transition:background .15s,transform .15s}.word{font:900 clamp(38px,11vw,82px) "Rubik";overflow-wrap:anywhere}.status{position:absolute;inset:0;display:grid;place-items:center;border-radius:inherit;font:900 clamp(38px,12vw,80px) "Rubik";opacity:0;transform:scale(.7);pointer-events:none}.word-card.correct .status{background:var(--green);color:#083b28;animation:feedback .55s ease}.word-card.skip .status{background:var(--red);color:#4a0914;animation:feedback .55s ease}@keyframes feedback{0%{opacity:0;transform:scale(.65)}30%,75%{opacity:1;transform:scale(1)}100%{opacity:0;transform:scale(1.1)}}
.sensor{font-size:14px;color:var(--muted);min-height:22px}.manual{display:flex;gap:12px;width:min(500px,100%)}.manual button{flex:1}.correct-btn{background:#164c38;color:#91f2c3}.skip-btn{background:#54202a;color:#ffadba}
.results{display:flex;gap:18px;margin:18px 0}.result{min-width:120px;padding:18px;border-radius:20px;background:#ffffff0b}.result b{display:block;font:900 42px "Rubik"}.result.correct b{color:var(--green)}.result.skipped b{color:#ff8d9e}
@media(max-height:650px){.word-card{min-height:34vh}.phone{font-size:32px}h1{margin:8px}.instructions{margin-bottom:12px}.screen{padding:10px 16px}}
@media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
</style>
</head>
<body>
<main id="lock" class="screen show"><div class="lock"><div class="badge">60</div><h2>המשחק נעול</h2><p>הסיסמה אמורה להגיע אוטומטית בקישור. אפשר גם להזין אותה ידנית.</p><form id="lockForm"><input id="password" type="password" placeholder="סיסמה" autocomplete="current-password"><div class="error" id="lockError"></div><button class="primary">פתיחת המשחק</button></form></div></main>

<main id="intro" class="screen"><div class="badge">60</div><h1>מי אני?</h1><p>מחזיקים את הטלפון מול המצח ומנסים לנחש כמה שיותר מילים בדקה.</p><div class="instructions"><div class="instruction"><span class="phone">📱↘</span><strong class="yes">הטיה מטה</strong>הצלחנו</div><div class="instruction"><span class="phone">📱↗</span><strong class="skip">הטיה מעלה</strong>דלג</div></div><div class="actions"><button class="primary" id="startBtn">מתחילים 🎉</button><a href="index.html" class="secondary" style="text-decoration:none">חזרה לשם קוד</a></div></main>

<main id="game" class="screen"><div class="game-head"><div class="score">הצלחנו: <span id="score">0</span></div><div class="timer" id="timer">60</div></div><div class="word-card" id="wordCard"><div class="word" id="word"></div><div class="status" id="status"></div></div><div class="sensor" id="sensor">מכייל את זווית הטלפון…</div><div class="manual"><button class="secondary skip-btn" id="skipBtn">דלג</button><button class="secondary correct-btn" id="correctBtn">הצלחנו</button></div></main>

<main id="end" class="screen"><div class="badge">60</div><h2>נגמר הזמן!</h2><div class="results"><div class="result correct"><b id="finalScore">0</b>הצלחנו</div><div class="result skipped"><b id="finalSkipped">0</b>דילגנו</div></div><div class="actions"><button class="primary" id="againBtn">עוד סיבוב</button><a href="index.html" class="secondary" style="text-decoration:none">חזרה לשם קוד</a></div></main>

<script>
const ENCRYPTED_WORDS={salt:"4Oy1Bz/1p8mPBYgbb9+3oA==",iv:"LyVRiePtYO4tVj4Z",data:"+assEqWwPzTk3iQe5EoK8wnHKmSd2xRT8XDlOpy3f/bUHAcpoBMGXE6CJqC3jSXP0KcIBgWtfgW7zozcxhYJCV1WVkp4e8eMzTSnpN1ByMKG3gldRZS+VfstCRaKEOTg9goi7nFHCJlJRizgwCTlSLqV8y1iiJLXaqtEDhOCIKTeONNMzXGlXhvwgum6Z0DDJAvfBV6w5l4Uvk5QMKrNxSpNGZLP9K9uNNjy+eryJ3rOHyc0JCliHRM5BOi7pophE+PZW8aGceu/9YcwCYBb8PY+ysCzjiDGKdh5xnO/OCz17kloOe20OFzuTyIDoHIx5/1YWsKBHbHl2WvFy6VyPu1eKKzZUNCnDbKFV2RD/U6tQLeGt5IAmh4yElBoNw0956sb3hM2acrpbelKwJ1KfCUXu+M0dpegr1BERKdJeTD+DOtpsQLotOEkcqbnJog2l196gwPISiwbA3oRq3CAI+0/v83wQ4Jm7Hva5BhBKtMGjBsJuSdX8BV3ZPkp5iUgf2UhHFykiJrWqOmbAqMEZ95szOi3HK9ysST8QSR0649yZxPYa33ymsloM6kjl6iDR3bqIb3JThyZLPBlIHJ9uqf+sTarNgunJ7Cli9jLgE6sBvxOl43l5yTwd1GxIvPqDUaCX9oTg6nBwCS7ocZ+cauZe9TNLfjGShbanYFdOIDrgulPUUtGrCpXo1U7Z6YZtIjpC6ziGgUL28g/JidX/uU9mX9qxI7UrncRtBbQJtkiejPs2MPA+5dJKOL9BVEAmNFS20Bf2Bk1IMgRlmSssWiYaD4iNw2Z7PuhVUtXbx/4vIovDnplEb6OBi3QqQ1vuE7qfbKQAHk0pPcm2aqejJem5c7BaVHKvD3Bx95rxBKn16m23eaommUkRMuwM4Lhy/5bhKQwSdR8VLnK9JboWMSMJno8CCGu/r7REo7byPTcWwmpJkNfUkyh2G1vKre+46+haO8fvc6adiZeQrFC10lS0VT4hIeVL+sf5lIBAXQ1idfVxOjTpeBw9xdioApeOc+2PobZ6qcXFm+KJfIuQL/eX6WxwJ21fvZ067QNOUCqjoMA2pmaQTkwYFgPZpf5o1WxFIX5NMaMQOmRpAR2Z0IcJxGKZ/yEDiiGOZmaEZVwnIUDuLPg88IrK/Dv54NIWPM="};
let words=[],deck=[],score=0,skipped=0,timeLeft=60,timerId=null,playing=false,baseline=null,armed=true,lastMove=0;
const $=id=>document.getElementById(id);const b64=v=>Uint8Array.from(atob(v),c=>c.charCodeAt(0));
async function decrypt(password){const m=await crypto.subtle.importKey("raw",new TextEncoder().encode(password),"PBKDF2",false,["deriveKey"]);const k=await crypto.subtle.deriveKey({name:"PBKDF2",salt:b64(ENCRYPTED_WORDS.salt),iterations:210000,hash:"SHA-256"},m,{name:"AES-GCM",length:256},false,["decrypt"]);const clear=await crypto.subtle.decrypt({name:"AES-GCM",iv:b64(ENCRYPTED_WORDS.iv)},k,b64(ENCRYPTED_WORDS.data));return JSON.parse(new TextDecoder().decode(clear))}
function show(id){document.querySelectorAll(".screen").forEach(x=>x.classList.remove("show"));$(id).classList.add("show")}
async function unlock(password){try{words=await decrypt(password);sessionStorage.setItem("whoamiPassword",password);show("intro")}catch{$("lockError").textContent="הסיסמה אינה נכונה"}}
function shuffle(a){for(let i=a.length-1;i;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}
function nextWord(){if(!deck.length)deck=shuffle(words.slice());$("word").textContent=deck.pop()}
async function start(){score=skipped=0;timeLeft=60;baseline=null;armed=true;playing=true;$("score").textContent="0";$("timer").textContent="60";$("sensor").textContent="מכייל את זווית הטלפון…";show("game");nextWord();window.addEventListener("deviceorientation",onOrientation);timerId=setInterval(()=>{timeLeft--;$("timer").textContent=timeLeft;if(timeLeft<=0)finish()},1000)}
function angleDelta(value,base){return((value-base+540)%360)-180}
function onOrientation(e){if(!playing||e.beta==null)return;if(baseline==null){baseline=e.beta;$("sensor").textContent="מוכן — הטו את הטלפון";return}const delta=angleDelta(e.beta,baseline);if(Math.abs(delta)<15)armed=true;if(!armed||Date.now()-lastMove<700)return;if(delta>32)answer(true);else if(delta<-32)answer(false)}
function answer(correct){if(!playing)return;armed=false;lastMove=Date.now();correct?score++:skipped++;$("score").textContent=score;navigator.vibrate?.(correct?[60,35,60]:120);const card=$("wordCard");card.classList.add(correct?"correct":"skip");$("status").textContent=correct?"הצלחנו!":"דילגנו";setTimeout(()=>{card.classList.remove("correct","skip");nextWord()},520)}
function finish(){playing=false;clearInterval(timerId);window.removeEventListener("deviceorientation",onOrientation);$("finalScore").textContent=score;$("finalSkipped").textContent=skipped;show("end")}
$("lockForm").onsubmit=e=>{e.preventDefault();const p=$("password").value;const hash=new URLSearchParams(location.hash.slice(1));hash.set("p",p);history.replaceState(null,"","#"+hash);unlock(p)};
$("startBtn").onclick=start;$("againBtn").onclick=start;$("correctBtn").onclick=()=>answer(true);$("skipBtn").onclick=()=>answer(false);
const params=new URLSearchParams(location.hash.slice(1));const password=params.get("p")||sessionStorage.getItem("whoamiPassword");if(password)unlock(password);
</script>
</body>
</html>
