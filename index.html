<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>יום הולדת לחניתה — שם קוד</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Rubik:wght@500;700;900&family=Heebo:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
  :root{
    --bg:#0e141b; --bg2:#131c26; --panel:#1a2531; --panel2:#22303f;
    --ink:#e9eef3; --muted:#8a99a8; --line:rgba(255,255,255,.08);
    --card:#e7e9ec; --card-ink:#16202b;
    --red:#d43b3b; --red-d:#9f2a2a;
    --blue:#2f80d6; --blue-d:#225f9f;
    --neutral:#c2a878; --neutral-ink:#2a2113;
    --assassin:#0b0b10; --assassin-ink:#cfd4da;
    --gold:#ffd166; --pink:#ef5da8; --purple:#9b5de5; --mint:#65d6ad;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;overflow:hidden}
  body{
    background:
      radial-gradient(circle at 12% 8%,rgba(239,93,168,.18),transparent 24%),
      radial-gradient(circle at 88% 14%,rgba(101,214,173,.16),transparent 22%),
      radial-gradient(1200px 700px at 70% -10%,#20243b 0%,var(--bg) 58%);
    color:var(--ink); font-family:"Heebo",system-ui,sans-serif;
    min-height:100%; -webkit-font-smoothing:antialiased;
  }
  body::before{content:"";position:fixed;inset:0;pointer-events:none;opacity:.22;background-image:radial-gradient(circle,#ffd166 1.5px,transparent 2px),radial-gradient(circle,#ef5da8 1.5px,transparent 2px),radial-gradient(circle,#65d6ad 1.5px,transparent 2px);background-size:74px 74px,91px 91px,113px 113px;background-position:0 0,20px 35px,50px 12px}
  .wrap{max-width:1100px;margin:0 auto;padding:10px 16px 12px;height:100dvh;display:flex;flex-direction:column}

  /* ---------- header ---------- */
  header{display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap;margin-bottom:8px}
  .brand{display:flex;align-items:center;gap:14px}
  .stamp{
    font-family:"Rubik";font-weight:900;letter-spacing:.5px;
    border:2px solid var(--gold);color:var(--gold);
    padding:4px 10px;border-radius:6px;transform:rotate(-4deg);
    font-size:13px;white-space:nowrap;
  }
  .stamp.birthday{border-color:var(--pink);color:#fff;background:linear-gradient(135deg,var(--pink),var(--purple));box-shadow:0 5px 18px rgba(239,93,168,.3)}
  h1{font-family:"Rubik";font-weight:900;font-size:34px;margin:0;line-height:1}
  h1 small{display:block;font-family:"Heebo";font-weight:500;font-size:12px;letter-spacing:3px;color:var(--muted);margin-top:6px}

  .controls{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
  button{
    font-family:"Heebo";font-weight:700;font-size:15px;cursor:pointer;
    border:1px solid var(--line);background:var(--panel);color:var(--ink);
    padding:11px 16px;border-radius:11px;transition:transform .06s ease, background .15s ease, border-color .15s;
  }
  button:hover{background:var(--panel2)}
  button:active{transform:translateY(1px)}
  button.primary{background:var(--gold);color:#231905;border-color:transparent}
  button.primary:hover{filter:brightness(1.06)}
  button.ghost{background:transparent}

  /* ---------- scoreboard ---------- */
  .score{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin:2px 0 8px}
  .pill{display:flex;align-items:center;gap:8px;padding:8px 14px;border-radius:999px;font-weight:700;font-size:15px;border:1px solid var(--line)}
  .pill .n{font-family:"Rubik";font-weight:900;font-size:18px}
  .pill.red{background:rgba(212,59,59,.14);color:#ff9a9a}
  .pill.blue{background:rgba(47,128,214,.16);color:#9cc8ff}
  .turn{cursor:pointer;user-select:none;border:1px dashed var(--line);background:transparent;color:var(--muted)}
  .turn b{color:var(--ink)}

  /* ---------- board ---------- */
  .board{display:grid;grid-template-columns:repeat(5,1fr);grid-template-rows:repeat(5,1fr);gap:8px;flex:1;min-height:0}
  .tile{
    position:relative;min-height:0;border-radius:14px;border:none;
    background:var(--card);color:var(--card-ink);
    font-family:"Rubik";font-weight:700;font-size:clamp(15px,2.3vw,26px);
    display:flex;align-items:center;justify-content:center;text-align:center;
    padding:6px;cursor:pointer;line-height:1.05;
    box-shadow:0 2px 0 rgba(0,0,0,.35), inset 0 0 0 1px rgba(0,0,0,.06);
    transition:transform .12s ease, box-shadow .12s ease, background .2s ease, color .2s;
    overflow:hidden;
  }
  .tile:hover{transform:translateY(-2px)}
  .tile:not(.revealed):hover{background:var(--card);color:var(--card-ink);filter:none;border-color:transparent}
  .tile .word{position:relative;z-index:2;word-break:break-word;text-shadow:none}
  .tile.revealed{cursor:pointer}
  .tile.revealed::after{content:"";position:absolute;inset:0;background:rgba(0,0,0,.0)}
  .tile.red{background:linear-gradient(180deg,var(--red),var(--red-d));color:#fff;box-shadow:0 2px 0 #6e1c1c}
  .tile.blue{background:linear-gradient(180deg,var(--blue),var(--blue-d));color:#fff;box-shadow:0 2px 0 #173f6a}
  .tile.neutral{background:linear-gradient(180deg,#d4be93,var(--neutral));color:var(--neutral-ink);box-shadow:0 2px 0 #8a744a}
  .tile.assassin{background:var(--assassin);color:var(--assassin-ink);box-shadow:0 2px 0 #000, inset 0 0 0 2px #2a2a33}
  .tile.assassin .word::before{content:"☠ ";opacity:.9}
  .tile.dim{opacity:.55}
  .tile.reveal-red{animation:revealRed .48s cubic-bezier(.2,1.35,.4,1)}
  .tile.reveal-blue{animation:revealBlue .48s cubic-bezier(.2,1.35,.4,1)}
  .tile.reveal-neutral{animation:revealNeutral .42s ease-out}
  .tile.reveal-assassin{animation:revealAssassin .65s ease-out}
  .tile.hide-card{animation:hideCard .28s ease-in-out}
  .card-confetti{position:fixed;left:var(--start-x);top:var(--start-y);z-index:46;width:var(--piece-w);height:var(--piece-h);border-radius:var(--piece-radius);pointer-events:none;background:var(--piece-color);box-shadow:0 0 var(--glow) var(--piece-color);animation:cardConfetti var(--duration) cubic-bezier(.1,.68,.2,1) forwards;will-change:transform,opacity}
  .card-celebration-flash{position:fixed;z-index:44;width:34px;height:34px;border-radius:50%;pointer-events:none;background:#fff;box-shadow:0 0 20px 10px var(--flash-color),0 0 70px 35px color-mix(in srgb,var(--flash-color) 55%,transparent);animation:celebrationFlash .8s ease-out forwards}
  @keyframes revealRed{0%{transform:perspective(500px) rotateY(85deg) scale(.88)}55%{transform:perspective(500px) rotateY(-8deg) scale(1.08);filter:brightness(1.35)}100%{transform:none;filter:none}}
  @keyframes revealBlue{0%{transform:perspective(500px) rotateX(80deg) scale(.88)}55%{transform:perspective(500px) rotateX(-7deg) scale(1.08);filter:brightness(1.4)}100%{transform:none;filter:none}}
  @keyframes revealNeutral{0%{transform:scale(.82);filter:sepia(1) brightness(1.4)}65%{transform:scale(1.06)}100%{transform:none;filter:none}}
  @keyframes revealAssassin{0%{transform:scale(.8);filter:brightness(3)}25%{transform:scale(1.1) rotate(-3deg)}38%{transform:rotate(3deg)}52%{transform:rotate(-2deg)}68%{transform:rotate(2deg)}100%{transform:none;filter:none}}
  @keyframes hideCard{0%{transform:scale(1)}50%{transform:scale(.86) rotateY(22deg);opacity:.65}100%{transform:none;opacity:1}}
  @keyframes cardConfetti{0%{transform:translate(-50%,0) rotate(0) scale(.8);opacity:1}72%{opacity:1}100%{transform:translate(calc(-50% + var(--fly-x)),var(--fly-y)) rotate(var(--r)) scale(1.08);opacity:0}}
  @keyframes celebrationFlash{0%{transform:translate(-50%,-50%) scale(.2);opacity:1}45%{transform:translate(-50%,-50%) scale(2.4);opacity:.8}100%{transform:translate(-50%,-50%) scale(4);opacity:0}}
  /* key-card (phone) tiles slightly different sizing handled by .keymode */

  /* ---------- modal / qr ---------- */
  .overlay{position:fixed;inset:0;background:rgba(4,8,12,.72);display:none;align-items:center;justify-content:center;padding:20px;z-index:50}
  .overlay.open{display:flex}
  .modal{background:var(--panel);border:1px solid var(--line);border-radius:18px;padding:22px;max-width:380px;width:100%;text-align:center}
  .modal h3{font-family:"Rubik";font-weight:900;margin:0 0 6px}
  .modal p{color:var(--muted);font-size:14px;margin:0 0 16px;line-height:1.5}
  #qr{background:#fff;padding:14px;border-radius:14px;display:inline-block;min-height:200px}
  #qr img,#qr canvas{display:block}
  .urlbox{margin-top:14px;display:flex;gap:8px}
  .urlbox input{flex:1;background:var(--bg2);border:1px solid var(--line);color:var(--ink);border-radius:10px;padding:10px;font-size:12px;direction:ltr;text-align:left}
  .hint{color:var(--muted);font-size:12.5px;margin-top:12px;line-height:1.5}
  .unlock{margin:auto;max-width:420px;width:100%}
  .unlock input{width:100%;background:var(--bg2);border:1px solid var(--line);color:var(--ink);border-radius:11px;padding:12px;font-size:16px;text-align:center;margin:12px 0 8px}
  .unlock .error{min-height:22px;color:#ff9a9a;font-size:14px}

  /* ---------- key (spymaster) view ---------- */
  .keyhead{text-align:center;margin-bottom:8px}
  .keyhead .secret{display:inline-block;background:rgba(227,169,43,.14);color:var(--gold);border:1px solid rgba(227,169,43,.4);padding:7px 14px;border-radius:999px;font-weight:700;font-size:13px}
  .keyhead h2{font-family:"Rubik";font-weight:900;margin:12px 0 4px;font-size:22px}
  .keymode .tile{cursor:default;min-height:0;font-size:clamp(13px,3.6vw,20px)}
  .keymode .tile:hover{transform:none}
  .legend{display:flex;gap:14px;justify-content:center;flex-wrap:wrap;margin-top:8px;color:var(--muted);font-size:13px}
  .legend span{display:inline-flex;align-items:center;gap:7px}
  .dot{width:13px;height:13px;border-radius:4px;display:inline-block}

  .foot{margin-top:8px;margin-bottom:0;color:var(--muted);font-size:12px;text-align:center;line-height:1.4}

  /* ---------- birthday decorations ---------- */
  .birthday-note{color:var(--gold);font-family:"Rubik";font-weight:700;font-size:13px;margin-top:4px}
  .party-decor{position:fixed;inset:0;pointer-events:none;z-index:1;overflow:hidden}
  .balloon{position:absolute;font-size:clamp(34px,5vw,58px);filter:drop-shadow(0 8px 8px rgba(0,0,0,.25));animation:balloonFloat 5s ease-in-out infinite}
  .balloon:nth-child(1){top:13%;left:1.5%;animation-delay:-1s}
  .balloon:nth-child(2){top:55%;right:1%;animation-delay:-3.2s;transform:scaleX(-1)}
  .balloon:nth-child(3){top:3%;right:9%;font-size:34px;animation-delay:-2s}
  .garland{position:absolute;top:-9px;left:0;width:100%;display:flex;justify-content:center;gap:5px;filter:drop-shadow(0 5px 4px rgba(0,0,0,.28))}
  .flag{width:0;height:0;border-left:15px solid transparent;border-right:15px solid transparent;border-top:30px solid var(--pink)}
  .flag:nth-child(4n+2){border-top-color:var(--gold)}
  .flag:nth-child(4n+3){border-top-color:var(--mint)}
  .flag:nth-child(4n){border-top-color:var(--purple)}
  .sixty-watermark{position:absolute;left:50%;top:49%;translate:-50% -50%;font-family:"Rubik";font-size:min(48vw,520px);font-weight:900;line-height:1;color:transparent;-webkit-text-stroke:2px rgba(255,209,102,.055);text-shadow:0 0 80px rgba(155,93,229,.08)}
  .sparkle{position:absolute;color:var(--gold);font-size:22px;animation:sparkle 2.2s ease-in-out infinite}
  .sparkle.s1{top:18%;right:5%}.sparkle.s2{bottom:15%;left:4%;animation-delay:-.8s}.sparkle.s3{top:48%;left:2%;animation-delay:-1.5s}
  .wrap{position:relative;z-index:2}
  @keyframes balloonFloat{0%,100%{translate:0 0;rotate:-4deg}50%{translate:0 -14px;rotate:5deg}}
  @keyframes sparkle{0%,100%{scale:.65;opacity:.35;rotate:0deg}50%{scale:1.25;opacity:1;rotate:35deg}}
  .party-surprise{position:fixed;z-index:1;pointer-events:none;will-change:transform,opacity;filter:drop-shadow(0 10px 12px rgba(0,0,0,.28))}
  .party-surprise.fly-rtl{right:-110px;top:18%;font-size:68px;animation:flyAcross 5.2s ease-in-out forwards}
  .party-surprise.fly-ltr{left:-110px;bottom:13%;font-size:64px;animation:flyAcrossReverse 5.2s ease-in-out forwards}
  .party-surprise.pop-60{left:50%;top:50%;font-family:"Rubik";font-size:min(27vw,230px);font-weight:900;color:var(--gold);text-shadow:0 6px 0 #b87811,0 14px 35px rgba(0,0,0,.5);animation:sixtyPop 2.8s cubic-bezier(.2,1.25,.35,1) forwards}
  @keyframes flyAcross{0%{transform:translateX(0) rotate(8deg);opacity:0}10%{opacity:1}48%{transform:translateX(-48vw) translateY(-35px) rotate(-8deg)}90%{opacity:1}100%{transform:translateX(calc(-100vw - 140px)) rotate(10deg);opacity:0}}
  @keyframes flyAcrossReverse{0%{transform:translateX(0) rotate(-8deg);opacity:0}10%{opacity:1}48%{transform:translateX(48vw) translateY(-40px) rotate(9deg)}90%{opacity:1}100%{transform:translateX(calc(100vw + 140px)) rotate(-10deg);opacity:0}}
  @keyframes sixtyPop{0%{transform:translate(-50%,-50%) scale(0) rotate(-16deg);opacity:0}20%{opacity:1}45%{transform:translate(-50%,-50%) scale(1.12) rotate(5deg)}70%{transform:translate(-50%,-50%) scale(1) rotate(0)}100%{transform:translate(-50%,-70%) scale(.8);opacity:0}}
  .age-badge{display:inline-grid;place-items:center;min-width:64px;height:64px;padding:0 10px;border-radius:50%;font-family:"Rubik";font-size:29px;font-weight:900;color:#291d05;background:radial-gradient(circle at 35% 25%,#fff4b8,var(--gold) 48%,#c98717);border:3px solid #fff0a5;box-shadow:0 0 0 5px rgba(255,209,102,.13),0 8px 24px rgba(0,0,0,.35);rotate:-6deg}
  .celebration-line{display:flex;align-items:center;justify-content:center;gap:8px;color:#fff1b9;font-weight:700;font-size:13px;margin-top:7px}
  .board{padding:5px;border:1px solid rgba(255,209,102,.18);border-radius:18px;box-shadow:0 0 35px rgba(155,93,229,.08)}

  /* assassin toast */
  .toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%) translateY(120px);
    background:var(--assassin);color:#fff;border:2px solid #34343f;padding:14px 22px;border-radius:14px;
    font-family:"Rubik";font-weight:900;font-size:18px;z-index:60;transition:transform .3s ease;box-shadow:0 12px 40px rgba(0,0,0,.6)}
  .toast.show{transform:translateX(-50%) translateY(0)}

  /* ---------- win celebration ---------- */
  #win{position:fixed;inset:0;display:none;align-items:center;justify-content:center;padding:20px;z-index:70}
  #win.show{display:flex}
  #win .winCard{
    text-align:center;background:rgba(10,16,22,.85);backdrop-filter:blur(6px);
    border:2px solid var(--gold);border-radius:24px;padding:32px 44px;
    box-shadow:0 24px 90px rgba(0,0,0,.75);
    transform:scale(.6);opacity:0;transition:transform .5s cubic-bezier(.2,1.3,.4,1),opacity .4s;
  }
  #win.show .winCard{transform:scale(1);opacity:1}
  #win .trophy{font-size:66px;line-height:1;filter:drop-shadow(0 8px 18px rgba(0,0,0,.5));animation:trophyPop .7s ease both}
  #win .winTeam{font-family:"Rubik";font-weight:900;font-size:clamp(34px,7vw,52px);margin:8px 0 2px}
  #win .winTeam.red{color:#ff7a7a;text-shadow:0 0 24px rgba(212,59,59,.6)}
  #win .winTeam.blue{color:#8fc1ff;text-shadow:0 0 24px rgba(47,128,214,.6)}
  #win .winSub{color:var(--muted);font-size:15px;margin:0 0 20px}
  #win .winBtns{display:flex;gap:10px;justify-content:center}
  @keyframes trophyPop{0%{transform:scale(0) rotate(-35deg)}65%{transform:scale(1.35) rotate(12deg)}100%{transform:scale(1) rotate(0)}}
  .confetti{position:fixed;top:-24px;z-index:68;pointer-events:none;border-radius:2px;will-change:transform}
  .confetti.behind{z-index:1}
  @keyframes confettiFall{
    0%{transform:translateY(-24px) rotateZ(0);opacity:1}
    100%{transform:translateY(106vh) rotateZ(720deg);opacity:.95}
  }

  @media (max-width:560px){
    h1{font-size:26px}
    .board{gap:7px}
    .tile{border-radius:11px}
    .controls button{padding:9px 12px;font-size:14px}
    .age-badge{min-width:49px;height:49px;font-size:22px}
    .garland{opacity:.7}
  }
  @media (prefers-reduced-motion:reduce){.balloon,.sparkle,.party-surprise,.tile{animation:none!important}.party-surprise,.card-confetti,.card-celebration-flash{display:none}}
</style>
</head>
<body>
<div class="party-decor" aria-hidden="true">
  <div class="garland"><i class="flag"></i><i class="flag"></i><i class="flag"></i><i class="flag"></i><i class="flag"></i><i class="flag"></i><i class="flag"></i><i class="flag"></i><i class="flag"></i><i class="flag"></i><i class="flag"></i><i class="flag"></i></div>
  <div class="sixty-watermark">60</div><span class="balloon">🎈</span><span class="balloon">🎈</span><span class="balloon">🎉</span><span class="sparkle s1">✦</span><span class="sparkle s2">✦</span><span class="sparkle s3">✦</span>
</div>
<div class="wrap" id="app"></div>

<!-- QR modal -->
<div class="overlay" id="overlay">
  <div class="modal">
    <h3>כרטיס המפתח למגדירים</h3>
    <p>שני המגדירים סורקים את הברקוד בטלפון כדי לראות את הצבעים. אל תראו את המסך של הטלפון לאף אחד אחר.</p>
    <div id="qr"></div>
    <div class="urlbox">
      <input id="urlInput" readonly>
      <button class="primary" id="copyBtn">העתק</button>
    </div>
    <button class="ghost" id="closeBtn" style="margin-top:14px">סגירה</button>
  </div>
</div>

<div class="toast" id="toast">☠ נחשף המתנקש</div>

<!-- win celebration -->
<div id="win">
  <div class="winCard">
    <div class="trophy">🏆</div>
    <div class="winTeam" id="winTeam">ניצחון!</div>
    <p class="winSub" id="winSub">כל הסוכנים זוהו</p>
    <div class="winBtns">
      <button class="primary" id="winNewBtn">🎲 לוח חדש</button>
      <button class="ghost" id="winCloseBtn">סגירה</button>
    </div>
  </div>
</div>

let WORDS=[];
let activePassword="";

function fromBase64(value){return Uint8Array.from(atob(value),c=>c.charCodeAt(0));}
async function decryptWords(password){
  const material=await crypto.subtle.importKey("raw",new TextEncoder().encode(password),"PBKDF2",false,["deriveKey"]);
  const key=await crypto.subtle.deriveKey({name:"PBKDF2",salt:fromBase64(ENCRYPTED_WORDS.salt),iterations:210000,hash:"SHA-256"},material,{name:"AES-GCM",length:256},false,["decrypt"]);
  const clear=await crypto.subtle.decrypt({name:"AES-GCM",iv:fromBase64(ENCRYPTED_WORDS.iv)},key,fromBase64(ENCRYPTED_WORDS.data));
  return JSON.parse(new TextDecoder().decode(clear));
}

/* ===== מחולל אקראי מבוסס seed (דטרמיניסטי) ===== */
function mulberry32(a){return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;};}
function shuffle(arr,rand){for(let i=arr.length-1;i>0;i--){const j=Math.floor(rand()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]];}return arr;}

/* בונה לוח זהה מאותו seed גם במחשב וגם בטלפון */
function buildBoard(seed){
  const rand=mulberry32(seed);
  const pool=shuffle(WORDS.slice(),rand);
  const words=pool.slice(0,25);
  let colors=[];
  for(let i=0;i<9;i++)colors.push("red");
  for(let i=0;i<8;i++)colors.push("blue");
  for(let i=0;i<7;i++)colors.push("neutral");
  colors.push("assassin");
  shuffle(colors,rand);
  return words.map((w,i)=>({word:w,color:colors[i]}));
}

const COLOR_HE={red:"אדום",blue:"כחול",neutral:"נייטרלי",assassin:"מתנקש"};
const baseUrl=()=>location.origin+location.pathname;

/* ===== ניתוב לפי ה-hash ===== */
function getParams(){return new URLSearchParams(location.hash.slice(1));}

async function init(){
  const p=getParams();
  const password=p.get("p")||sessionStorage.getItem("gamePassword")||"";
  try{
    if(!password) throw new Error("missing");
    WORDS=await decryptWords(password);
    activePassword=password;
    sessionStorage.setItem("gamePassword",password);
  }catch(e){ renderUnlock(password!==""); return; }
  if(p.has("key")){ renderKey(parseInt(p.get("key"),10)); return; }
  const seed = p.has("board") ? parseInt(p.get("board"),10) : null;
  renderBoard(seed);
}

function renderUnlock(invalid){
  const app=document.getElementById("app");
  app.className="wrap";
  app.innerHTML=`<div class="modal unlock"><div class="age-badge">60</div><div class="stamp birthday" style="display:inline-block;margin-right:12px">🎂 חניתה חוגגת</div><h3 style="margin-top:20px">שישה עשורים של אהבה ושמחה</h3><p>סרקו את קוד ה־QR של המשחק. אפשר גם להזין את הסיסמה ידנית.</p><form id="unlockForm"><input id="passwordInput" type="password" autocomplete="current-password" placeholder="סיסמה" autofocus><div class="error">${invalid?"הסיסמה אינה נכונה":""}</div><button class="primary" type="submit">כניסה לחגיגת ה־60 🎉</button></form><div class="celebration-line">✨ משפחה · חברות · אהבה · נתינה ✨</div></div>`;
  document.getElementById("unlockForm").onsubmit=e=>{
    e.preventDefault();
    const p=getParams();p.set("p",document.getElementById("passwordInput").value);
    location.hash=p.toString();
  };
}

function gameHash(kind,seed){
  const p=new URLSearchParams();p.set(kind,String(seed));p.set("p",activePassword);return p.toString();
}

/* ========================================================= */
/* ===============   מסך מחשב — הלוח   ====================== */
/* ========================================================= */
let state=null;

function renderBoard(seed){
  if(!seed||isNaN(seed)){ seed=Math.floor(Math.random()*1e9); history.replaceState(null,"","#"+gameHash("board",seed)); }
  const board=buildBoard(seed);
  state={seed,board,revealed:Array(25).fill(false),turn:"red",winner:null};
  hideWin();

  const app=document.getElementById("app");
  app.className="wrap";
  app.innerHTML=`
    <header>
      <div class="brand">
        <div class="age-badge">60</div><div class="stamp birthday">🎂 חוגגים לחניתה</div>
        <div><h1>שם קוד<small>משחק יום ההולדת</small></h1><div class="birthday-note">מזל טוב! 🎉</div></div>
      </div>
      <div class="controls">
        <button class="ghost" id="qrBtn">📷 כרטיס מפתח (QR)</button>
        <button class="primary" id="newBtn">🎲 לוח חדש</button>
      </div>
    </header>

    <div class="score">
      <div class="pill red"><span class="n" id="redN">0</span> אדום מתוך 9</div>
      <div class="pill blue"><span class="n" id="blueN">0</span> כחול מתוך 8</div>
      <button class="pill turn" id="turnBtn">תור: <b id="turnTxt">אדום</b> — לחצו להחלפה</button>
    </div>

    <div class="board" id="board"></div>
  `;

  const boardEl=document.getElementById("board");
  board.forEach((cell,i)=>{
    const t=document.createElement("button");
    t.className="tile";
    t.innerHTML=`<span class="word">${cell.word}</span>`;
    t.addEventListener("click",()=>toggleReveal(i,t));
    boardEl.appendChild(t);
  });

  document.getElementById("newBtn").onclick=()=>{const s=Math.floor(Math.random()*1e9);location.hash=gameHash("board",s);};
  document.getElementById("qrBtn").onclick=()=>openQR(seed);
  document.getElementById("turnBtn").onclick=()=>{
    state.turn=state.turn==="red"?"blue":"red";
    document.getElementById("turnTxt").textContent=state.turn==="red"?"אדום":"כחול";
  };
}

function toggleReveal(i,el){
  const cell=state.board[i];
  state.revealed[i]=!state.revealed[i];
  if(state.revealed[i]){
    el.classList.add("revealed",cell.color);
    animateTile(el,cell.color,true);
    if(cell.color==="assassin"){
      showToast();
      if(!state.winner){ const w=state.turn==="red"?"blue":"red"; celebrate(w,"הקבוצה היריבה חשפה את המתנקש"); }
    }
  }else{
    el.classList.remove("revealed","red","blue","neutral","assassin");
    animateTile(el,cell.color,false);
  }
  updateScore();
}

function animateTile(el,color,revealing){
  const classes=["reveal-red","reveal-blue","reveal-neutral","reveal-assassin","hide-card"];
  el.classList.remove(...classes);
  void el.offsetWidth;
  const animationClass=revealing?"reveal-"+color:"hide-card";
  el.classList.add(animationClass);
  el.addEventListener("animationend",()=>el.classList.remove(animationClass),{once:true});
  if(revealing&&(color==="red"||color==="blue")){
    const palette=color==="red"?["#ff4040","#ff7b7b","#ffd166","#fff","#ef5da8"]:["#2585ed","#63b3ff","#8fd3ff","#fff","#9b5de5"];
    const rect=el.getBoundingClientRect();
    const flash=document.createElement("i");
    flash.className="card-celebration-flash";
    flash.style.left=(rect.left+rect.width/2)+"px";
    flash.style.top=(rect.top+5)+"px";
    flash.style.setProperty("--flash-color",color==="red"?"#ff4d6d":"#4da3ff");
    document.body.appendChild(flash);
    setTimeout(()=>flash.remove(),900);
    for(let i=0;i<84;i++){
      const piece=document.createElement("i");
      piece.className="card-confetti";
      piece.style.setProperty("--piece-color",palette[i%palette.length]);
      piece.style.setProperty("--piece-w",(5+Math.random()*7)+"px");
      piece.style.setProperty("--piece-h",(i%5===0?5:10+Math.random()*10)+"px");
      piece.style.setProperty("--piece-radius",i%5===0?"50%":"2px");
      piece.style.setProperty("--glow",i%7===0?"9px":"0px");
      piece.style.setProperty("--start-x",(rect.left+rect.width/2+(Math.random()-.5)*26)+"px");
      piece.style.setProperty("--start-y",(rect.top+4)+"px");
      piece.style.setProperty("--fly-x",((Math.random()-.5)*Math.min(innerWidth*1.25,1100))+"px");
      piece.style.setProperty("--fly-y",(-260-Math.random()*Math.min(innerHeight*.8,720))+"px");
      piece.style.setProperty("--r",((Math.random()>.5?1:-1)*(540+Math.random()*900))+"deg");
      const duration=2.3+Math.random()*1.1;
      const delay=(i%3)*.18+Math.random()*.18;
      piece.style.setProperty("--duration",duration+"s");
      piece.style.animationDelay=delay+"s";
      document.body.appendChild(piece);
      setTimeout(()=>piece.remove(),(duration+delay+.2)*1000);
    }
  }
}

function updateScore(){
  let r=0,b=0;
  state.board.forEach((c,i)=>{if(state.revealed[i]){if(c.color==="red")r++;if(c.color==="blue")b++;}});
  document.getElementById("redN").textContent=r;
  document.getElementById("blueN").textContent=b;
  if(!state.winner){
    if(r>=9) celebrate("red","כל 9 הסוכנים האדומים זוהו");
    else if(b>=8) celebrate("blue","כל 8 הסוכנים הכחולים זוהו");
  }
}

/* ===== חגיגת ניצחון ===== */
function celebrate(team,sub){
  state.winner=team;
  const isRed=team==="red";
  const colors=isRed?["#d43b3b","#ff7a7a","#e3a92b","#ffffff"]:["#2f80d6","#8fc1ff","#e3a92b","#ffffff"];
  const teamEl=document.getElementById("winTeam");
  teamEl.textContent=(isRed?"אדום":"כחול")+" ניצח!";
  teamEl.className="winTeam "+team;
  document.getElementById("winSub").textContent=sub||"";
  document.getElementById("win").classList.add("show");
  launchConfetti(colors);
  const burst=setInterval(()=>launchConfetti(colors),850);
  setTimeout(()=>clearInterval(burst),3000);
}

function launchConfetti(colors,behind=false){
  for(let i=0;i<120;i++){
    const c=document.createElement("div");
    c.className="confetti"+(behind?" behind":"");
    c.style.left=Math.random()*100+"vw";
    c.style.background=colors[i%colors.length];
    c.style.width=(6+Math.random()*7)+"px";
    c.style.height=(10+Math.random()*10)+"px";
    const dur=2.4+Math.random()*2;
    c.style.animation=`confettiFall ${dur}s linear ${Math.random()*.5}s forwards`;
    document.body.appendChild(c);
    setTimeout(()=>c.remove(),(dur+1)*1000);
  }
}

/* הפתעות יום הולדת קצרות שמופיעות מדי פעם */
let partyTimer=null;
function launchPartySurprise(){
  if(matchMedia("(prefers-reduced-motion: reduce)").matches||document.hidden)return;
  const choices=[
    {text:"🎈",className:"fly-rtl",duration:5400},
    {text:"🎂",className:"fly-ltr",duration:5400},
    {text:"60",className:"pop-60",duration:3000},
    {text:"🎁",className:"fly-rtl",duration:5400}
  ];
  const pick=choices[Math.floor(Math.random()*choices.length)];
  const el=document.createElement("div");
  el.className="party-surprise "+pick.className;
  el.textContent=pick.text;
  document.body.appendChild(el);
  if(Math.random()<.45) launchConfetti(["#ffd166","#ef5da8","#65d6ad","#9b5de5"],true);
  setTimeout(()=>el.remove(),pick.duration);
}
function schedulePartySurprises(){
  if(partyTimer)return;
  const schedule=()=>{partyTimer=setTimeout(()=>{partyTimer=null;launchPartySurprise();schedule();},7000+Math.random()*7000);};
  setTimeout(launchPartySurprise,2200);
  schedule();
}

function hideWin(){
  const w=document.getElementById("win");
  if(w) w.classList.remove("show");
  document.querySelectorAll(".confetti").forEach(c=>c.remove());
}

function showToast(){
  const t=document.getElementById("toast");
  t.classList.add("show");
  setTimeout(()=>t.classList.remove("show"),2600);
}

/* ===== מודאל QR ===== */
function openQR(seed){
  const url=baseUrl()+"#"+gameHash("key",seed);
  const box=document.getElementById("qr");
  box.innerHTML="";
  document.getElementById("urlInput").value=url;
  if(window.QRCode){
    new QRCode(box,{text:url,width:200,height:200,correctLevel:QRCode.CorrectLevel.M});
  }else{
    box.innerHTML='<div style="color:#333;font-size:13px;padding:20px">טען מחדש לאינטרנט כדי להציג QR.<br>בינתיים העתיקו את הקישור למטה.</div>';
  }
  document.getElementById("overlay").classList.add("open");
}
function closeQR(){document.getElementById("overlay").classList.remove("open");}

/* ===== חיווט כללי ===== */
document.getElementById("closeBtn").onclick=closeQR;
document.getElementById("overlay").addEventListener("click",e=>{if(e.target.id==="overlay")closeQR();});
document.getElementById("copyBtn").onclick=()=>{
  const inp=document.getElementById("urlInput");inp.select();

  const b=document.getElementById("copyBtn");b.textContent="הועתק ✓";setTimeout(()=>b.textContent="העתק",1500);

window.addEventListener("hashchange",init);
init();
schedulePartySurprises();
